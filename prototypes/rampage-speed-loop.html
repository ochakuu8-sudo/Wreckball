<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no,maximum-scale=1" />
<title>Rampage Speed Loop Prototype</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}html,body{width:100%;height:100%;background:#070508;display:flex;align-items:center;justify-content:center;overflow:hidden;touch-action:none;color:#fff;font-family:system-ui,sans-serif}#wrap{position:relative;width:360px;height:580px;transform-origin:center;background:#111;box-shadow:0 0 0 3px #000,0 0 32px rgba(255,110,20,.25)}canvas{display:block;width:360px;height:580px;image-rendering:pixelated;background:#151018}#hud{position:absolute;inset:0;pointer-events:none;text-shadow:2px 2px 0 #000;font-weight:900;letter-spacing:.5px}#speedBar{position:absolute;top:8px;left:8px;right:8px;height:15px;border:2px solid #f6a623;background:#1c1008;box-shadow:2px 2px 0 #000;overflow:hidden}#speedFill{height:100%;width:0%;background:linear-gradient(90deg,#ff3b2f,#ffcc22,#77ff66)}#speedText{position:absolute;top:26px;left:8px;font:900 13px monospace;color:#ffe079}#powerText{position:absolute;top:43px;left:8px;font:900 11px monospace;color:#89d8ff}#comboText{position:absolute;top:26px;right:8px;text-align:right;font:900 13px monospace;color:#fff}#distText{position:absolute;top:43px;right:8px;text-align:right;font:900 11px monospace;color:#bbb}#centerMsg{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;text-align:center;white-space:pre-line;font:900 22px/1.35 monospace;color:#ffd020;text-shadow:3px 3px 0 #000,0 0 20px rgba(255,220,80,.4);padding:18px}#subMsg{position:absolute;left:0;right:0;bottom:14px;text-align:center;font:800 9px/1.6 monospace;color:#cfcfcf;text-shadow:2px 2px 0 #000;padding:0 10px}#warning{position:absolute;left:0;right:0;top:74px;text-align:center;font:900 12px monospace;color:#ff5448;display:none;animation:blink .25s steps(2,end) infinite}@keyframes blink{50%{opacity:.2}}
</style>
</head>
<body>
<div id="wrap"><canvas id="c" width="360" height="580"></canvas><div id="hud"><div id="speedBar"><div id="speedFill"></div></div><div id="speedText">SPEED 0</div><div id="powerText">WRECK POWER I</div><div id="comboText">COMBO x0</div><div id="distText">0 m</div><div id="warning">LOW SPEED - CRUSH HUMANS!</div><div id="centerMsg">RAMPAGE SPEED LOOP\nTAP / CLICK TO START</div><div id="subMsg">壊す → 人間が逃げる → 潰す → 加速 → もっと大きい街を壊す</div></div></div>
<script>
(()=>{
const canvas=document.getElementById('c'),ctx=canvas.getContext('2d'),wrap=document.getElementById('wrap');
const speedFill=document.getElementById('speedFill'),speedText=document.getElementById('speedText'),powerText=document.getElementById('powerText'),comboText=document.getElementById('comboText'),distText=document.getElementById('distText'),centerMsg=document.getElementById('centerMsg'),warning=document.getElementById('warning');
const W=360,H=580,MIN_SPEED=44,START_SPEED=92,MAX_SPEED=520,LOW_SPEED_TIME=3.2;
let rngSeed=1,started=false,over=false,left=false,right=false,last=0,scroll=0,speed=START_SPEED,combo=0,comboTimer=0,lowTimer=0,overdrive=0,score=0,buildings=[],humans=[],particles=[];
function scale(){wrap.style.transform=`scale(${Math.min(innerWidth/W,innerHeight/H)})`}addEventListener('resize',scale);scale();
function rnd(){rngSeed=(rngSeed*1664525+1013904223)>>>0;return rngSeed/4294967296}function choice(a){return a[Math.floor(rnd()*a.length)]}function clamp(v,a,b){return Math.max(a,Math.min(b,v))}
function power(){if(overdrive>0)return 5;if(speed<105)return 1;if(speed<185)return 2;if(speed<285)return 3;if(speed<405)return 4;return 5}function roman(n){return ['','I','II','III','IV','V'][n]||'V'}
const defs={house:{w:24,h:24,tier:1,hum:4,col:'#b97845'},shop:{w:34,h:28,tier:1,hum:8,col:'#6090d0'},ramen:{w:30,h:24,tier:1,hum:9,col:'#d95736'},apartment:{w:38,h:52,tier:2,hum:16,col:'#8794aa'},station:{w:76,h:38,tier:3,hum:38,col:'#d7b56a'},office:{w:42,h:74,tier:3,hum:26,col:'#78b8de'},factory:{w:58,h:44,tier:3,hum:10,col:'#77706a'},tower:{w:44,h:98,tier:4,hum:46,col:'#79d6ff'},stadium:{w:88,h:52,tier:5,hum:80,col:'#e8d787'}};
const districts=[
{name:'RESIDENTIAL',kinds:['house','house','shop'],density:7,road:'#303038',bg:'#1a1714'},
{name:'SHOPPING',kinds:['shop','ramen','shop','apartment'],density:10,road:'#303035',bg:'#18151b'},
{name:'STATION FRONT',kinds:['station','shop','ramen','apartment'],density:8,road:'#353238',bg:'#191920'},
{name:'OFFICE',kinds:['office','apartment','shop'],density:7,road:'#2b3037',bg:'#14181d'},
{name:'INDUSTRIAL',kinds:['factory','factory','shop'],density:6,road:'#292725',bg:'#15130f'},
{name:'HIGHRISE',kinds:['tower','office','apartment'],density:6,road:'#28323a',bg:'#10161c'},
{name:'MASS CROWD',kinds:['stadium','station','shop'],density:5,road:'#38302c',bg:'#17120f'}];
function spawnDistrict(y){const d=choice(districts);const lanes=[-135,-81,-27,27,81,135];for(let i=0;i<d.density;i++){const kind=choice(d.kinds),def=defs[kind],x=choice(lanes)+(rnd()*18-9),by=y+35+rnd()*170;buildings.push({kind,x,y:by,w:def.w,h:def.h,tier:def.tier,hum:def.hum,alive:true,flash:0,col:def.col,district:d.name});}for(let i=0;i<6;i++)humans.push({x:-160+rnd()*320,y:y+20+rnd()*190,vx:(rnd()*2-1)*26,vy:(rnd()*2-1)*20,alive:true,life:6,value:.55});}
function reset(){rngSeed=(Date.now()>>>0)||1;started=false;over=false;scroll=0;speed=START_SPEED;combo=0;comboTimer=0;lowTimer=0;overdrive=0;score=0;buildings=[];humans=[];particles=[];for(let y=-40;y<1600;y+=220)spawnDistrict(y);centerMsg.style.display='flex';centerMsg.textContent='RAMPAGE SPEED LOOP\nTAP / CLICK TO START';updateHud();}
function start(){if(over)reset();started=true;centerMsg.style.display='none'}
function burstHumans(b){for(let i=0;i<b.hum;i++){const a=rnd()*Math.PI*2,r=8+rnd()*22;humans.push({x:b.x+Math.cos(a)*r,y:b.y+Math.sin(a)*r,vx:Math.cos(a)*(35+rnd()*70),vy:Math.sin(a)*(25+rnd()*55)+25,alive:true,life:4.2+rnd()*2.5,value:1+b.tier*.18});}}
function wreck(b){b.alive=false;score+=b.tier*100*Math.max(1,combo*.15);burstHumans(b);combo++;comboTimer=1.65;if(combo>=18)overdrive=Math.max(overdrive,2.7);speed=clamp(speed+8+b.tier*3,0,MAX_SPEED);for(let i=0;i<20+b.tier*8;i++)particles.push({x:b.x,y:b.y,vx:(rnd()*2-1)*(80+b.tier*20),vy:(rnd()*2-1)*(80+b.tier*20),life:.45+rnd()*.45,col:b.col,s:3+rnd()*4});}
function crush(h){h.alive=false;combo++;comboTimer=1.35;const mult=1+Math.min(combo,40)*.035;speed=clamp(speed+(10+h.value*9)*mult,0,MAX_SPEED);score+=Math.floor(15*mult);if(combo>=24)overdrive=Math.max(overdrive,2.4);for(let i=0;i<4;i++)particles.push({x:h.x,y:h.y,vx:(rnd()*2-1)*55,vy:(rnd()*2-1)*55,life:.25+rnd()*.2,col:'#ff4b35',s:3});}
function update(dt){if(!started||over)return;const p=power();speed=clamp(speed-(overdrive>0?11:23)*dt,0,MAX_SPEED);if(left)speed=clamp(speed+18*dt,0,MAX_SPEED);if(right)speed=clamp(speed+18*dt,0,MAX_SPEED);overdrive=Math.max(0,overdrive-dt);scroll+=speed*dt*.68;if(scroll+H+480>highestY())for(let y=highestY();y<scroll+H+900;y+=220)spawnDistrict(y);comboTimer-=dt;if(comboTimer<=0)combo=0;if(speed<MIN_SPEED){lowTimer+=dt;warning.style.display='block'}else{lowTimer=0;warning.style.display='none'}if(lowTimer>LOW_SPEED_TIME){over=true;centerMsg.style.display='flex';centerMsg.textContent=`RUN OVER\nDIST ${Math.floor(scroll/10)} m\nSCORE ${Math.floor(score).toLocaleString()}\nTAP TO RETRY`;}
for(const b of buildings){if(!b.alive)continue;b.flash=Math.max(0,b.flash-dt);const sy=H-(b.y-scroll);if(sy<-160)continue;const hitX=Math.abs(b.x)<b.w/2+15,hitY=sy>408-b.h&&sy<448+b.h;if(hitX&&hitY){if(p>=b.tier){wreck(b)}else{b.flash=.08;speed=clamp(speed-(28+b.tier*14),0,MAX_SPEED);combo=0;for(let i=0;i<8;i++)particles.push({x:b.x,y:b.y,vx:(rnd()*2-1)*45,vy:(rnd()*2-1)*45,life:.25,col:'#ffffff',s:3});}}}
for(const h of humans){if(!h.alive)continue;h.life-=dt;h.x+=h.vx*dt;h.y+=h.vy*dt;h.vx+=(h.x>0?1:-1)*8*dt;if(h.x<-174||h.x>174)h.vx*=-.7;if(h.life<=0||h.y<scroll-80)h.alive=false;const sy=H-(h.y-scroll);if(Math.abs(h.x)<18&&sy>410&&sy<462)crush(h);}
for(const q of particles){q.x+=q.vx*dt;q.y+=q.vy*dt;q.life-=dt;q.vy-=45*dt}particles=particles.filter(q=>q.life>0);humans=humans.filter(h=>h.alive||h.y>scroll-100);buildings=buildings.filter(b=>b.alive||b.y>scroll-160);updateHud();}
function highestY(){let m=0;for(const b of buildings)m=Math.max(m,b.y);return m+180}
function updateHud(){speedFill.style.width=`${clamp(speed/MAX_SPEED*100,0,100)}%`;speedText.textContent=`SPEED ${Math.floor(speed)}`;powerText.textContent=`WRECK POWER ${roman(power())}${overdrive>0?' / OVERDRIVE':''}`;comboText.textContent=`COMBO x${combo}`;distText.textContent=`${Math.floor(scroll/10)} m`}
function draw(){ctx.clearRect(0,0,W,H);ctx.fillStyle='#161018';ctx.fillRect(0,0,W,H);for(let y=Math.floor(scroll/220)*220;y<scroll+H+220;y+=220){const sy=H-(y-scroll);ctx.fillStyle=['#18151b','#15191f','#19140f'][Math.abs(Math.floor(y/220))%3];ctx.fillRect(0,sy-220,W,220);ctx.fillStyle='#303035';ctx.fillRect(172,sy-220,16,220);ctx.fillRect(0,sy-6,W,12);}
for(const b of buildings){const sy=H-(b.y-scroll);if(sy<-150||sy>H+120)continue;const can=power()>=b.tier;ctx.globalAlpha=b.alive?1:.18;ctx.fillStyle=b.flash>0?'#fff':b.col;ctx.fillRect(W/2+b.x-b.w/2,sy-b.h,b.w,b.h);ctx.strokeStyle=can?'#ffd020':'#602828';ctx.lineWidth=can?2:1;ctx.strokeRect(W/2+b.x-b.w/2-1,sy-b.h-1,b.w+2,b.h+2);ctx.fillStyle='#0008';ctx.fillRect(W/2+b.x-b.w/2+3,sy-9,b.w-6,4);ctx.globalAlpha=1;}
ctx.fillStyle='#ffdd8c';for(const h of humans){const sy=H-(h.y-scroll);if(sy<-20||sy>H+20)continue;ctx.fillRect(W/2+h.x-1.5,sy-4,3,7)}for(const p of particles){const sy=H-(p.y-scroll);ctx.globalAlpha=Math.max(0,p.life*2);ctx.fillStyle=p.col;ctx.fillRect(W/2+p.x-p.s/2,sy-p.s/2,p.s,p.s);ctx.globalAlpha=1}
ctx.fillStyle=overdrive>0?'#ffec6a':'#ff4b2f';ctx.beginPath();ctx.arc(W/2,435,16,0,Math.PI*2);ctx.fill();ctx.fillStyle='#ffd0a0';ctx.beginPath();ctx.arc(W/2-5,430,4,0,Math.PI*2);ctx.fill();ctx.strokeStyle='#ffd020';ctx.lineWidth=7;ctx.lineCap='round';ctx.beginPath();ctx.moveTo(86,520);ctx.lineTo(left?150:132,492);ctx.moveTo(274,520);ctx.lineTo(right?210:228,492);ctx.stroke();if(speed>250){ctx.globalAlpha=clamp((speed-250)/250,0,.55);ctx.strokeStyle='#fff';ctx.lineWidth=1;for(let i=0;i<20;i++){const x=rnd()*W,y=rnd()*H;ctx.beginPath();ctx.moveTo(x,y);ctx.lineTo(x,y+20+rnd()*60);ctx.stroke()}ctx.globalAlpha=1}}
function loop(t){const dt=Math.min(.033,(t-last)/1000||0);last=t;update(dt);draw();requestAnimationFrame(loop)}
addEventListener('mousedown',e=>{start();left=e.clientX<innerWidth/2;right=e.clientX>=innerWidth/2});addEventListener('mouseup',()=>{left=right=false});addEventListener('touchstart',e=>{e.preventDefault();start();left=right=false;for(const t of e.touches){const x=t.clientX/innerWidth;if(x<.45)left=true;else if(x>.55)right=true;else left=right=true}},{passive:false});addEventListener('touchend',e=>{e.preventDefault();left=right=false},{passive:false});addEventListener('keydown',e=>{start();if(e.key==='a'||e.key==='ArrowLeft')left=true;if(e.key==='d'||e.key==='ArrowRight')right=true;if(e.key===' ')left=right=true});addEventListener('keyup',e=>{if(e.key==='a'||e.key==='ArrowLeft')left=false;if(e.key==='d'||e.key==='ArrowRight')right=false;if(e.key===' ')left=right=false});
reset();requestAnimationFrame(t=>{last=t;requestAnimationFrame(loop)})
})();
</script>
</body>
</html>
